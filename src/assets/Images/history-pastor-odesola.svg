<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 720" role="img" aria-labelledby="title desc">
  <title id="title">Pastor J. F. Odesola portrait panel</title>
  <desc id="desc">A refined portrait placeholder panel with the initials JO.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
